body:
  text: 後漢安息國三藏安世高譯聞如是一時佛住王舍城迦蘭陀竹園爾時目連晡時從禪定起遊恆水邊見諸餓鬼受罪不同時諸餓鬼見尊者目連皆起敬心來問因緣一鬼問言我一生以來恆患頭痛何罪所致目連答言汝為人時好以杖打衆生頭今受花報果入地獄一鬼問言我一生已來資財無量而樂著弊衣何罪所致目連答言汝為人時布施作福還復悔惜今受花報果在地獄一鬼問言我一生已來宿無常處恆倚巷陌何罪所致目連答言汝為人時客來投止不肯安處見他止客亦復瞋恚今受花報果入地獄一鬼問言我食不噉一斛而不得飽何罪所致目連答言汝為人時飯飼衆生初不令足今受花報果入地獄一鬼問言我一生已來腹大如甕咽細如針孔不得下食何罪所致目連答言汝為人時作聚落主自恃豪強輕欺百姓強打拍人索好美食今受花報果入地獄一鬼問言我一生已來恆患男根瘡爛痛不可言何罪所致目連答言汝為人時佛圖精舍清淨之處行於淫欲今受花報果入地獄一鬼問言我一生已來多有兒子皆端正可喜而皆早死念之斷絶痛不可言何罪所致目連答言汝為人時見兒殺生助喜噉肉殺生故短命喜故痛毒今受花報果入地獄一鬼問言我一生已來有一狗體大牙利兩目赫赤常來噉我何罪所致目連答言汝為人時喜將狗獵殘害衆生無有慈心今受花報果在地獄一鬼問言我一生已來有一人持諸利刀常割我肉盡便持去須臾尋生而復來割痛不可言何罪所致目連答言汝為人時喜屠割衆生初無慈心今受花報果入地獄一鬼問言我一生已來恆患身體處處皆痛不可得忍何罪所致目連答言汝為人時好漁獵所網得魚投之沙土令其苦死今受花報果入地獄一鬼問言我一生已來頑無所知何罪所致目連答言汝為人時強勸人酒令其顛倒今受花報果入地獄一鬼問言我一生已來恆患熱渴行見恆河冀入其中以除熱渴方入其中身體焦爛肌肉離骨渴欲飲之一口入腹五藏焦爛痛不可言何罪所致目連答言汝為人時喜焚燒山澤殘害衆生今受花報果入地獄一鬼問言我一生已來恆患飢渴欲至廁上取糞噉之廁上有大力鬼以杖打我初不能得近何罪所致目連答言汝為人時作佛圖主有客比丘來慳惜不與食待客去後乃行與舊僧慳惜僧物故今受花報果入地獄一鬼問言我一生已來恆處不淨臭惱纏身不能得離飢渴之時還食此不淨何罪所致目連答言汝為人時作婆羅門子有一道人中後來就汝乞食汝爾時當作是方便令此道人不復來乞便取其鉢盛糞著底以飯覆之道人得鉢還至本處著一面澡漱既訖攝鉢欲食鉢中臭穢不可得近以是之故墮在地獄汝將來世墮糞屎彌犁地獄中一鬼問言我一生已來肩上有銅瓶盛滿中洋銅一手捉銅杓以取之還灌其頭痛不可言何罪所致目連答言汝為人時作僧維那知僧事有一瓶酥藏著餘處不行與僧待客去後乃行與舊僧此酥是招提僧物一切有分慳惜僧物故今受花報果入地獄一鬼問言我一生已來或登刀山劍樹地獄或墮火坑鑊湯地獄種種受苦無復休已何罪所致目連答言汝為人時作天祠主烹殺三牲祭祀天神血肉灌灑四方語衆人言汝等祠祀大得吉利作此魔邪之言妖孽之語輕欺百姓誑惑父母以是之故果入地獄一鬼問言我一生以來常吞鐵丸何罪所致目連答言汝為人時作沙彌子取淨水作石蜜漿石蜜堅大盜打取少許衆僧未食盜食一口故以是因緣果入地獄汝將來世常吞鐵丸爾時目連與諸餓鬼説往昔因緣經竟還來在耆闍崛山一切大會聞佛所説稽首奉行
